@let sectionVal = section();

<div [class.edit-mode]="editMode()" class="section" (click)="enterEditMode($event)">
  <div class="section-titlebar sui flex-x px-2 gap-1 ai-center only-editmode">
    <b class="sui py-2 grow-1">{{ sectionLabels.get(sectionVal.SectionType) ?? sectionVal.SectionType }}</b>
    <button (mousedown)="enterMoveMode()" class="move-button small">verschieben</button>
    <ng-icon class="x" (click)="deleteSection()" name="bootstrapX" size="22px"/>
  </div>

  <div class="section-content">
    <div class="section-preview themable article">
      <ng-container #outlet [ngTemplateOutlet]="preview"/>
    </div>
    <div class="section-editor only-editmode">
      <app-section-editor-all-sections class="sui grow-1" [section]="sectionVal" (triggerRerender)="triggerRerender()"/>
    </div>
  </div>
</div>

<ng-template #preview>
  <app-section-renderer [section]="section()"/>
</ng-template>
