<div class="sui flex-y gap-2">
  <app-text-input [long]="true" idName="updateNote" [(twoWayModel)]="updateNote" label="Updatetext eingeben (z.B. 'Neue Bilder von Snoopy')"/>
  <div class="sui flex-x jc-end gap-1">
    <button class="secondary" (click)="cancel()">Abbrechen</button>
    <button class="secondary" (click)="sendSaveInfo(false)">Ohne Update Speichern</button>
    <button class="primary" (click)="sendSaveInfo(true)">Speichern</button>
  </div>
</div>
