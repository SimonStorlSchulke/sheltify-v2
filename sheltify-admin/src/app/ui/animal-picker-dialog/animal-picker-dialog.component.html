@for (entry of animalsByArticleID(); track $index) {
  <div class="sui my-1 flex-x ai-center jc-space-between gap-2">
    <span>{{entry[1].title}}</span>
    <button [attr.data-testid]="'btn-select-animalarticle-' + entry[1].title" class="small" (click)="finishWith(entry[1].animals[0])">auswählen ></button>
  </div>
} @empty {
  <p>Keine Tiere entsprechen den Anforderungen</p>
  <br>
  <button class="secondary" (click)="cancel()">Ok</button>
}
